# OTel Collector ВёцВаЋ Рђћ AgentВЮў heartbeat вЕћьіИвдГвДї вІцвБИ.
#
# ьЮљвдё: Agent(OTLP HTTP) Рєњ otlp receiver Рєњ kafka exporter (otlp_json) Рєњ topic "heartbeats"
#
# spec ┬Д5.4 / ADR #2, #13 В░ИВА░.

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318

exporters:
  kafka:
    # Ж░ЎВЮђ compose network Рђћ вѓ┤вХђ DOCKER listener ВѓгВџЕ.
    brokers: [kafka:29092]
    topic: heartbeats
    encoding: otlp_json

service:
  pipelines:
    metrics:
      receivers: [otlp]
      exporters: [kafka]
